# 只需要修改这3行！
baseURL: "https://sooyangsx.github.io/"  # 替换成你的GitHub用户名
title: Exploration and Learning  # 你的博客名字
author: sooyangsx  # 你的名字

# 以下内容不需要修改，直接用
languageCode: zh-cn
theme: PaperMod

# 顶部导航菜单（和blackmanba.top完全一样）
menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

# 主题核心配置
params:
  env: production
  description: 用于展示个人知识和工作成果
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

# 分页设置
paginate: 10